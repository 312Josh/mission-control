services:
  mission-control:
    container_name: mission-control
    build:
      context: .
      dockerfile: Dockerfile
    image: mission-control:latest
    ports:
      - "4000:4000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/mission-control.db
      WORKSPACE_BASE_PATH: /app/workspace
      PROJECTS_PATH: /app/workspace/projects
      OPENCLAW_GATEWAY_URL: ws://host.docker.internal:52943
      OPENCLAW_GATEWAY_TOKEN: UBidjuqsrx9RgSu0FsbKIitxKjvXUgzNUE8mKCpLfXk
    volumes:
      - mission-control-data:/app/data
      - mission-control-workspace:/app/workspace
    restart: unless-stopped

volumes:
  mission-control-data:
  mission-control-workspace:
